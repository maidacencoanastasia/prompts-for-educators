<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multilingual AI Prompt Library for Educators — USM">
    <title>Prompt Library for Educators — USM</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.js"></script>
    <style>
        :root {
            --p:      #007a33;
            --p-dk:   #003d1a;
            --p-md:   #005a26;
            --p-lt:   #e8f5ee;
            --p-bd:   #b3d4bf;
            --bg:     #f4f7f5;
            --surf:   #ffffff;
            --bdr:    #e5e7eb;
            --t1:     #111827;
            --t2:     #4b5563;
            --t3:     #9ca3af;
            --r:      12px;
            --rsm:    8px;
            --rpill:  50px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px; line-height: 1.6; color: var(--t1); background: var(--bg);
        }

        /* ── Navbar ─────────────────────────────────────────────── */
        .navbar { position: sticky; top: 0; z-index: 200; background: var(--p-dk); box-shadow: 0 1px 0 rgba(255,255,255,.07); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 58px; display: flex; align-items: center; gap: 14px; }
        .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; color: #fff; font-weight: 700; font-size: .96em; letter-spacing: -.01em; flex-shrink: 0; }
        .nav-brand-icon { width: 30px; height: 30px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .nav-links { display: flex; gap: 2px; flex: 1; }
        .nav-link { padding: 5px 12px; border-radius: 6px; font-size: .88em; font-weight: 500; color: rgba(255,255,255,.65); cursor: pointer; background: none; border: none; font-family: inherit; transition: all .14s; text-decoration: none; display: inline-block; }
        .nav-link:hover  { color: #fff; background: rgba(255,255,255,.08); }
        .nav-link.active { color: #fff; background: rgba(255,255,255,.13); }
        .lang-grp { display: flex; gap: 4px; flex-shrink: 0; }
        .lang-btn { padding: 4px 10px; border-radius: 6px; font-size: .79em; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.6); background: transparent; transition: all .14s; font-family: inherit; }
        .lang-btn:hover:not(.active) { border-color: rgba(255,255,255,.45); color: #fff; }
        .lang-btn.active { background: var(--p); color: #fff; border-color: var(--p); }

        /* ── Hero ───────────────────────────────────────────────── */
        .hero { background: linear-gradient(140deg, #002a12 0%, #004820 40%, #003d1a 75%, #002a12 100%); padding: 54px 20px 44px; text-align: center; color: #fff; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 55%, rgba(0,122,51,.28) 0%, transparent 55%), radial-gradient(circle at 80% 25%, rgba(0,50,20,.45) 0%, transparent 50%); }
        .hero-inner { position: relative; max-width: 640px; margin: 0 auto; }
        .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); padding: 4px 14px; border-radius: 20px; font-size: .76em; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,.8); margin-bottom: 18px; }
        .hero h1 { font-size: clamp(1.65em, 4vw, 2.45em); font-weight: 800; line-height: 1.18; letter-spacing: -.025em; margin-bottom: 11px; }
        .hero-sub { font-size: .98em; opacity: .73; margin-bottom: 28px; }
        .hero-search-wrap { position: relative; max-width: 500px; margin: 0 auto 22px; }
        .search-ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--t3); pointer-events: none; }
        .hero-search { width: 100%; padding: 14px 50px 14px 48px; border: none; border-radius: var(--rpill); font-size: 15px; font-family: inherit; background: #fff; outline: none; color: var(--t1); box-shadow: 0 8px 28px rgba(0,0,0,.3); }
        .hero-search:focus { box-shadow: 0 8px 28px rgba(0,0,0,.35), 0 0 0 3px rgba(255,255,255,.22); }
        .search-clr { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--t3); padding: 4px; display: none; line-height: 1; align-items: center; justify-content: center; }
        .search-clr.on { display: flex; }
        .hero-meta { display: flex; justify-content: center; gap: 20px; font-size: .83em; color: rgba(255,255,255,.6); flex-wrap: wrap; }
        .hero-meta-item { display: flex; align-items: center; gap: 5px; }
        .hero-meta-num { font-weight: 700; color: #fff; }

        /* ── Page layout ────────────────────────────────────────── */
        .content-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 80px; display: grid; grid-template-columns: 230px 1fr; gap: 24px; align-items: start; }
        @media (max-width: 860px) { .content-wrap { grid-template-columns: 1fr; } .sidebar-desktop { display: none; } }

        /* ── Sidebar ─────────────────────────────────────────────── */
        .sidebar-desktop { position: sticky; top: 74px; }
        .sb-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
        .sb-head { padding: 11px 14px 9px; border-bottom: 1px solid var(--bdr); font-size: .73em; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--t3); }
        .sb-body { padding: 6px; }
        .sb-cat { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--rsm); cursor: pointer; font-size: .89em; color: var(--t1); transition: all .13s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
        .sb-cat:hover  { background: var(--p-lt); color: var(--p); }
        .sb-cat.active { background: var(--p-dk); color: #fff; font-weight: 600; }
        .sb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .sb-n { margin-left: auto; font-size: .75em; font-weight: 600; background: rgba(0,0,0,.06); border-radius: 10px; padding: 1px 6px; }
        .sb-cat.active .sb-n { background: rgba(255,255,255,.2); }

        /* ── Mobile pills ────────────────────────────────────────── */
        .mob-pills { display: none; overflow-x: auto; gap: 6px; padding-bottom: 14px; scrollbar-width: none; }
        .mob-pills::-webkit-scrollbar { display: none; }
        .m-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--rpill); font-size: .82em; font-weight: 600; cursor: pointer; border: 1.5px solid var(--bdr); background: var(--surf); color: var(--t2); white-space: nowrap; transition: all .13s; flex-shrink: 0; font-family: inherit; }
        .m-pill:hover  { border-color: var(--p); color: var(--p); background: var(--p-lt); }
        .m-pill.active { background: var(--p-dk); color: #fff; border-color: var(--p-dk); }
        @media (max-width: 860px) { .mob-pills { display: flex; } }

        /* ── Results bar ─────────────────────────────────────────── */
        .res-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; font-size: .84em; color: var(--t2); }

        /* ── Cards grid ──────────────────────────────────────────── */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

        .prompt-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r); display: flex; flex-direction: column; cursor: pointer; overflow: hidden; transition: box-shadow .2s, transform .15s; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .prompt-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.1); transform: translateY(-2px); }
        .card-stripe { height: 4px; flex-shrink: 0; }
        .card-inner { padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .cat-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: .71em; font-weight: 700; letter-spacing: .01em; white-space: nowrap; align-self: flex-start; }
        .card-title { font-size: .95em; font-weight: 700; color: var(--t1); line-height: 1.4; }
        .card-preview { font-size: .84em; color: var(--t2); line-height: 1.65; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; white-space: pre-line; }
        .card-foot { display: flex; align-items: center; gap: 8px; justify-content: space-between; margin-top: 4px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; }
        .tag { padding: 2px 7px; border-radius: 6px; font-size: .71em; background: var(--bg); color: var(--t2); border: 1px solid var(--bdr); white-space: nowrap; }
        .open-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: var(--rsm); font-size: .79em; font-weight: 600; cursor: pointer; background: var(--p-lt); color: var(--p-md); border: 1px solid var(--p-bd); font-family: inherit; transition: all .13s; flex-shrink: 0; white-space: nowrap; }
        .open-btn:hover { background: var(--p); color: #fff; border-color: var(--p); }

        /* ── Empty / Loading ─────────────────────────────────────── */
        .state-panel { grid-column: 1 / -1; text-align: center; padding: 72px 20px; color: var(--t2); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--bdr); border-top-color: var(--p); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ───────────────────────────────────────────────── */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.52); backdrop-filter: blur(5px); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 16px; animation: fIn .15s ease; }
        @keyframes fIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--surf); border-radius: var(--r); max-width: 660px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 24px 56px rgba(0,0,0,.24); animation: sUp .18s ease; overflow: hidden; }
        @keyframes sUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-stripe { height: 4px; flex-shrink: 0; }
        .modal-head { padding: 18px 20px 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
        .modal-head-l { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0; }
        .modal-title { font-size: 1.1em; font-weight: 700; color: var(--t1); line-height: 1.35; }
        .modal-close { background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--t2); transition: all .13s; flex-shrink: 0; }
        .modal-close:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
        .modal-scroll { padding: 18px 20px; overflow-y: auto; flex: 1; }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .modal-content-box { background: var(--bg); border: 1px solid var(--bdr); border-radius: var(--rsm); padding: 16px 18px; font-size: .9em; line-height: 1.8; color: var(--t1); white-space: pre-wrap; word-break: break-word; font-family: 'SF Mono','Cascadia Code','Consolas','Courier New',monospace; max-height: 340px; overflow-y: auto; }
        .modal-foot { padding: 14px 20px; border-top: 1px solid var(--bdr); display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; background: #fafafa; }
        .copy-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 22px; border-radius: var(--rsm); font-size: .88em; font-weight: 600; cursor: pointer; background: var(--p-dk); color: #fff; border: none; font-family: inherit; transition: background .15s; }
        .copy-btn:hover { background: var(--p-md); }
        .copy-btn.ok { background: #16a34a; }

        /* ── Footer ──────────────────────────────────────────────── */
        .site-footer { text-align: center; padding: 24px 20px; font-size: .84em; color: var(--t3); border-top: 1px solid var(--bdr); }

        /* ── Scrollbar ───────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--p-bd); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--p); }

        @media (max-width: 480px) {
            .hero { padding: 36px 14px 30px; }
            .hero h1 { font-size: 1.55em; }
            .brand-text { display: none; }
            .content-wrap { padding: 16px 12px 60px; }
        }
    </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav class="navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="index.html">
            <div class="nav-brand-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M2 3h12M2 6h9M2 9h11M2 12h7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="brand-text" id="navBrand">Prompt Library</span>
        </a>
        <div class="nav-links">
            <a class="nav-link active" href="index.html" id="navHome">Library</a>
            <a class="nav-link" href="about.html" id="navAbout">About</a>

        <div class="lang-grp" role="group" aria-label="Language selector">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ro">RO</button>
            <button class="lang-btn" data-lang="ru">RU</button>
        </div>
    </div>
</nav>

<!-- ── Hero ───────────────────────────────────────────────────── -->
<section class="hero">
    <div class="hero-inner">
        <div class="hero-badge">📚 USM · Educator Toolkit</div>
        <h1 id="heroTitle">Prompt Library for Educators</h1>
        <p class="hero-sub" id="heroSub">Discover multilingual AI prompts for modern educators</p>
        <div class="hero-search-wrap">
            <svg class="search-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" id="searchInput" class="hero-search"
                   placeholder="Search prompts…" autocomplete="off" spellcheck="false" aria-label="Search prompts">
            <button class="search-clr" id="searchClear" aria-label="Clear search">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6 6 18M6 6l12 12"/>

            </button>
        </div>
        <div class="hero-meta">
            <span class="hero-meta-item"><span class="hero-meta-num" id="totalCount">—</span> <span id="metaPrompts">prompts</span></span>
            <span class="hero-meta-item"><span class="hero-meta-num" id="catCount">—</span> <span id="metaCats">categories</span></span>
            <span class="hero-meta-item"><span class="hero-meta-num">EN · RO · RU</span></span>
        </div>
    </div>
</section>

<!-- ── Content ────────────────────────────────────────────────── -->
<div class="content-wrap">
    <aside class="sidebar-desktop">
        <div class="sb-card">
            <div class="sb-head" id="sbLabel">Categories</div>
            <div class="sb-body" id="sidebarCats"></div>
        </div>
    </aside>
    <div class="main-col" style="min-width:0">
        <div class="mob-pills" id="mobileCats" role="list"></div>
        <div class="res-bar">
            <span id="resultsCount"></span>
        </div>
        <div class="cards-grid" id="cardsGrid" role="list">
            <div class="state-panel">
                <div class="spinner"></div>
                <p>Loading prompts…</p>
            </div>
        </div>
    </div>
</div>

<footer class="site-footer">
    <span id="footerText">Prompt Library for Educators — USM © 2026 · Maidacenco Anastasia</span>
</footer>

<!-- ── Modal ──────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalBackdrop" style="display:none"
     role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
        <div class="modal-stripe" id="modalStripe"></div>
        <div class="modal-head">
            <div class="modal-head-l">
                <span class="cat-badge" id="modalBadge"></span>
                <div class="modal-title" id="modalTitle"></div>
            </div>
            <button class="modal-close" id="modalCloseBtn" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-scroll">
            <div class="modal-tags" id="modalTags"></div>
            <div class="modal-content-box" id="modalContent"></div>
        </div>
        <div class="modal-foot">
            <button class="copy-btn" id="copyBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span id="copyBtnText">Copy Prompt</span>
            </button>
        </div>
    </div>
</div>

<script>
/* ── Category color palette ─────────────────────────────────── */
const PAL = {
    'Assessment':              { bg:'#dbeafe', text:'#1e40af', stripe:'#3b82f6' },
    'Lesson Planning':         { bg:'#ede9fe', text:'#5b21b6', stripe:'#7c3aed' },
    'Logopedics':              { bg:'#fce7f3', text:'#9d174d', stripe:'#ec4899' },
    'Communication':           { bg:'#fef3c7', text:'#78350f', stripe:'#f59e0b' },
    'Differentiation':         { bg:'#d1fae5', text:'#064e3b', stripe:'#10b981' },
    'Creativity':              { bg:'#ffedd5', text:'#7c2d12', stripe:'#f97316' },
    'University':              { bg:'#e0e7ff', text:'#3730a3', stripe:'#6366f1' },
    'Academic Writing':        { bg:'#ccfbf1', text:'#115e59', stripe:'#14b8a6' },

    'Psychology & Pedagogy':   { bg:'#fdf2f8', text:'#701a75', stripe:'#c026d3' },
    'Mathematics & Informatics':{ bg:'#eff6ff', text:'#1e3a8a', stripe:'#1d4ed8' },
    'Philology':               { bg:'#fdf4ff', text:'#581c87', stripe:'#7e22ce' },
    'Biology & Sciences':      { bg:'#f0fdf4', text:'#14532d', stripe:'#15803d' },
    'Chemistry':               { bg:'#fff7ed', text:'#9a3412', stripe:'#ea580c' },
    'Physics & Engineering':   { bg:'#f0f9ff', text:'#075985', stripe:'#0284c7' },
    'History & Philosophy':    { bg:'#fefce8', text:'#713f12', stripe:'#ca8a04' },

};
function pal(cat) { return PAL[cat] || { bg:'#f3f4f6', text:'#374151', stripe:'#6b7280' }; }

/* ── i18n ───────────────────────────────────────────────────── */
const UI = {
    en: {

        heroSub:   "Discover multilingual AI prompts for modern educators",
        footer:    "Prompt Library for Educators — USM © 2026 · Maidacenco Anastasia",
        navBrand: "Prompt Library", navHome: "Library", navAbout: "About",
        openCard: "Open", metaPrompts: "prompts", metaCats: "categories",

        cats: "Categorii", all: "Toate",

        noHint: "Încearcă alte cuvinte cheie sau șterge filtrul.",
        count: (n, tot) => n === tot ? `${n} prompturi` : `${n} din ${tot} prompturi`,
        heroTitle: "Bibliotecă de Prompturi pentru Educatori",

        footer:    "Bibliotecă de Prompturi — USM © 2026 · Maidacenco Anastasia",
        navBrand: "Prompt Library", navHome: "Bibliotecă", navAbout: "Despre",

    ru: {
        searchPlaceholder: "Поиск промптов…",
        copy: "Копировать промпт", copied: "Скопировано!",
        cats: "Категории", all: "Все",
        noResults: "Промпты не найдены.",
        noHint: "Попробуйте другие ключевые слова или сбросьте фильтр.",
        count: (n, tot) => n === tot ? `${n} промптов` : `${n} из ${tot} промптов`,
        heroTitle: "Библиотека промптов для педагогов",
        heroSub:   "Многоязычные AI-промпты для современных педагогов",
        footer:    "Библиотека промптов — USM © 2026 · Майдаченко Анастасия",
        navBrand: "Prompt Library", navHome: "Библиотека", navAbout: "О нас",
        openCard: "Открыть", metaPrompts: "промптов", metaCats: "категорий",
    }
};

const CAT_LABELS = {
    "All":                       { en:"All",                       ro:"Toate",                        ru:"Все"                          },
    "Assessment":                { en:"Assessment",                ro:"Evaluare",                     ru:"Оценивание"                   },
    "Lesson Planning":           { en:"Lesson Planning",           ro:"Planif. lecției",              ru:"Планир. урока"                },
    "Logopedics":                { en:"Logopedics",                ro:"Logopedie",                    ru:"Логопедия"                    },
    "Communication":             { en:"Communication",             ro:"Comunicare",                   ru:"Коммуникация"                 },
    "Differentiation":           { en:"Differentiation",           ro:"Diferențiere",                 ru:"Дифференциация"               },
    "Creativity":                { en:"Creativity",                ro:"Creativitate",                 ru:"Творчество"                   },
    "University":                { en:"University",                ro:"Universitar",                  ru:"Университет"                  },
    "Academic Writing":          { en:"Academic Writing",          ro:"Scriere academică",            ru:"Акад. письмо"                 },
    "Student Productivity":      { en:"Student Productivity",      ro:"Productivitate student",       ru:"Продуктивность"               },
    "Teaching Support":          { en:"Teaching Support",          ro:"Suport didactic",              ru:"Пед. поддержка"               },
    "University Educators":      { en:"University Educators",      ro:"Cadre did. universitare",      ru:"Преподаватели вузов"          },
    /* ── Faculty categories ─────────────────────────────────── */
    "Law":                       { en:"Law",                       ro:"Drept",                        ru:"Юридический"                  },
    "Economic Sciences":         { en:"Economic Sciences",         ro:"Științe Economice",            ru:"Экономические науки"          },
    "Psychology & Pedagogy":     { en:"Psychology & Pedagogy",     ro:"Psihologie & Pedagogie",       ru:"Психология и педагогика"      },
    "Mathematics & Informatics": { en:"Mathematics & Informatics", ro:"Matematică & Informatică",     ru:"Математика и информатика"     },
    "Philology":                 { en:"Philology",                 ro:"Filologie",                    ru:"Филология"                    },
    "Biology & Sciences":        { en:"Biology & Sciences",        ro:"Biologie & Știinte",           ru:"Биология и науки"             },
    "Chemistry":                 { en:"Chemistry",                 ro:"Chimie & Tehnologie",          ru:"Химия и технологии"           },
    "Physics & Engineering":     { en:"Physics & Engineering",     ro:"Fizică & Inginerie",           ru:"Физика и инженерия"           },
    "History & Philosophy":      { en:"History & Philosophy",      ro:"Istorie & Filosofie",          ru:"История и философия"          },
    "Journalism":                { en:"Journalism",                ro:"Jurnalism & Comunicare",       ru:"Журналистика"                 },
    "International Relations":   { en:"International Relations",   ro:"Relații Internaționale",       ru:"Международные отношения"      },
    "Physical Education":        { en:"Physical Education",        ro:"Educație Fizică & Sport",      ru:"Физическое воспитание"        },
};

/* ── State ──────────────────────────────────────────────────── */
const state = { lang:'en', category:'All', query:'', prompts:[], modal:null };
let fuseInstance = null;

/* ── Hash utils ─────────────────────────────────────────────── */
function parseHash() {
    const p = new URLSearchParams(location.hash.replace(/^#/, ''));
    return { lang: p.get('lang')||'en', cat: p.get('cat')||'All', q: p.get('q')||'' };
}
function pushHash() {
    const p = new URLSearchParams();
    if (state.lang !== 'en')      p.set('lang', state.lang);
    if (state.category !== 'All') p.set('cat',  state.category);
    if (state.query.trim())       p.set('q',    state.query.trim());
    const s = p.toString();
    history.pushState(null, '', s ? '#' + s : location.pathname + location.search);
}

/* ── Fuse ───────────────────────────────────────────────────── */
function buildFuse() {
    const l = state.lang;
    fuseInstance = new Fuse(state.prompts, {
        keys: [
            { name: `title.${l}`,   weight: 0.40 },
            { name: `content.${l}`, weight: 0.35 },
            { name: 'tags',         weight: 0.25 },
            { name: 'title.en',     weight: 0.15 },
            { name: 'content.en',   weight: 0.10 },
        ],
        threshold: 0.38, ignoreLocation: true, minMatchCharLength: 2,
    });
}

/* ── Helpers ────────────────────────────────────────────────── */
function t(obj) { return (obj && (obj[state.lang] || obj.en)) || ''; }
function catLabel(cat) { return (CAT_LABELS[cat] && CAT_LABELS[cat][state.lang]) || cat; }
function esc(s) {
    return String(s).replace(/[&<>"']/g,
        m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function getResults() {
    let list = state.query.trim().length >= 2 && fuseInstance
        ? fuseInstance.search(state.query).map(r => r.item)
        : [...state.prompts];
    if (state.category !== 'All') list = list.filter(p => p.category === state.category);
    return list;
}
function getCounts() {
    const base = state.query.trim().length >= 2 && fuseInstance
        ? fuseInstance.search(state.query).map(r => r.item)
        : [...state.prompts];
    return base.reduce((acc, p) => { acc[p.category] = (acc[p.category]||0)+1; return acc; }, {});
}

/* ── Render sidebar ─────────────────────────────────────────── */
function renderSidebar(counts) {
    document.getElementById('sbLabel').textContent = UI[state.lang].cats;
    const cats  = ['All', ...new Set(state.prompts.map(p => p.category))];
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    document.getElementById('sidebarCats').innerHTML = cats.map(cat => {
        const n = cat === 'All' ? total : (counts[cat]||0);
        const c = pal(cat);
        const dot = cat === 'All' ? '#6b7280' : c.stripe;
        return `<button class="sb-cat${state.category===cat?' active':''}" data-cat="${esc(cat)}">
            <span class="sb-dot" style="background:${dot}"></span>
            <span>${esc(catLabel(cat))}</span>
            <span class="sb-n">${n}</span>
        </button>`;
    }).join('');
}

/* ── Render mobile pills ────────────────────────────────────── */
function renderMobilePills(counts) {
    const cats  = ['All', ...new Set(state.prompts.map(p => p.category))];
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    document.getElementById('mobileCats').innerHTML = cats.map(cat => {
        const n = cat === 'All' ? total : (counts[cat]||0);
        const c = pal(cat);
        const dot = cat === 'All' ? '#6b7280' : c.stripe;
        return `<button class="m-pill${state.category===cat?' active':''}" data-cat="${esc(cat)}">
            <span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
            ${esc(catLabel(cat))} <span style="opacity:.55;font-weight:400">${n}</span>
        </button>`;
    }).join('');
}

/* ── Render cards ───────────────────────────────────────────── */
function renderCards(results) {
    const ui   = UI[state.lang];
    const grid = document.getElementById('cardsGrid');
    if (!results.length) {
        grid.innerHTML = `<div class="state-panel">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" style="margin:0 auto 16px;display:block">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <p style="font-weight:700;font-size:1em;margin:0 0 6px;color:#374151">${esc(ui.noResults)}</p>
            <p style="margin:0;font-size:.88em">${esc(ui.noHint)}</p>
        </div>`;
        return;
    }
    grid.innerHTML = results.map(p => {
        const c    = pal(p.category);
        const tags = (p.tags||[]).slice(0,3).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
        const pid  = esc(p.id);
        return `<article class="prompt-card" onclick="openModal('${pid}')" role="listitem" aria-label="${esc(t(p.title))}">
            <div class="card-stripe" style="background:${c.stripe}"></div>
            <div class="card-inner">
                <span class="cat-badge" style="background:${c.bg};color:${c.text}">${esc(catLabel(p.category))}</span>
                <div class="card-title">${esc(t(p.title))}</div>
                <div class="card-preview">${esc(t(p.content))}</div>
                <div class="card-foot">
                    <div class="card-tags">${tags}</div>
                    <button class="open-btn" onclick="event.stopPropagation();openModal('${pid}')">${esc(ui.openCard)} ↗</button>
                </div>
            </div>
        </article>`;
    }).join('');
}

/* ── Full render ────────────────────────────────────────────── */
function render() {
    const ui      = UI[state.lang];
    const results = getResults();
    const counts  = getCounts();
    const cats    = new Set(state.prompts.map(p => p.category));

    document.getElementById('navBrand').textContent     = ui.navBrand;
    document.getElementById('navHome').textContent      = ui.navHome;
    document.getElementById('navAbout').textContent     = ui.navAbout;
    document.getElementById('heroTitle').textContent    = ui.heroTitle;
    document.getElementById('heroSub').textContent      = ui.heroSub;
    document.getElementById('totalCount').textContent   = state.prompts.length;
    document.getElementById('catCount').textContent     = cats.size;
    document.getElementById('metaPrompts').textContent  = ui.metaPrompts;
    document.getElementById('metaCats').textContent     = ui.metaCats;
    document.getElementById('footerText').textContent   = ui.footer;
    document.getElementById('searchInput').placeholder  = ui.searchPlaceholder;
    document.getElementById('searchClear').classList.toggle('on', state.query.length > 0);
    document.getElementById('resultsCount').textContent = ui.count(results.length, state.prompts.length);
    document.title = ui.heroTitle + ' — USM';
    document.documentElement.lang = state.lang;

    document.querySelectorAll('.lang-btn').forEach(btn => {
        const a = btn.dataset.lang === state.lang;
        btn.classList.toggle('active', a);
        btn.setAttribute('aria-pressed', a);
    });

    localStorage.setItem('pl-lang', state.lang);
    renderSidebar(counts);
    renderMobilePills(counts);
    renderCards(results);
}

/* ── Modal ──────────────────────────────────────────────────── */
function openModal(id) {
    const p  = state.prompts.find(x => x.id === id);
    if (!p) return;
    const ui = UI[state.lang];
    const c  = pal(p.category);
    state.modal = id;

    document.getElementById('modalStripe').style.background = c.stripe;
    const badge = document.getElementById('modalBadge');
    badge.textContent = catLabel(p.category);
    badge.style.cssText = `background:${c.bg};color:${c.text};display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72em;font-weight:700`;
    document.getElementById('modalTitle').textContent    = t(p.title);
    document.getElementById('modalTags').innerHTML       = (p.tags||[]).map(tag=>`<span class="tag">${esc(tag)}</span>`).join('');
    document.getElementById('modalContent').textContent  = t(p.content);
    document.getElementById('copyBtnText').textContent   = ui.copy;
    document.getElementById('copyBtn').classList.remove('ok');
    document.getElementById('modalBackdrop').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    state.modal = null;
    document.getElementById('modalBackdrop').style.display = 'none';
    document.body.style.overflow = '';
}

function copyFromModal() {
    if (!state.modal) return;
    const p   = state.prompts.find(x => x.id === state.modal);
    if (!p) return;
    const text = t(p.content);
    const ui   = UI[state.lang];
    const btn  = document.getElementById('copyBtn');
    const lbl  = document.getElementById('copyBtnText');
    const done = () => {
        lbl.textContent = ui.copied;
        btn.classList.add('ok');
        setTimeout(() => { lbl.textContent = ui.copy; btn.classList.remove('ok'); }, 2200);
    };
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(done);
    } else {
        const ta = Object.assign(document.createElement('textarea'), { value: text });
        Object.assign(ta.style, { position:'fixed', opacity:'0', top:'0', left:'0' });
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(_) {}
        document.body.removeChild(ta); done();
    }
}

/* ── Event listeners ────────────────────────────────────────── */
document.getElementById('sidebarCats').addEventListener('click', e => {
    const btn = e.target.closest('.sb-cat');
    if (btn) { state.category = btn.dataset.cat; pushHash(); render(); }
});
document.getElementById('mobileCats').addEventListener('click', e => {
    const btn = e.target.closest('.m-pill');
    if (btn) { state.category = btn.dataset.cat; pushHash(); render(); }
});

let debTimer;
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debTimer);
    debTimer = setTimeout(() => { state.query = e.target.value; pushHash(); render(); }, 180);
});
document.getElementById('searchClear').addEventListener('click', () => {
    state.query = '';
    document.getElementById('searchInput').value = '';
    pushHash(); render();
    document.getElementById('searchInput').focus();
});

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
    if (state.lang === btn.dataset.lang) return;
    state.lang = btn.dataset.lang;
    buildFuse(); pushHash(); render();
}));

document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.getElementById('copyBtn').addEventListener('click', copyFromModal);
document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.addEventListener('popstate', () => {
    const h = parseHash();
    state.lang     = ['en','ro','ru'].includes(h.lang) ? h.lang : 'en';
    state.category = h.cat;
    state.query    = h.q;
    document.getElementById('searchInput').value = state.query;
    buildFuse(); render();
});

/* ── Bootstrap ──────────────────────────────────────────────── */
async function init() {
    const h = parseHash();
    const saved = localStorage.getItem('pl-lang');
    state.lang     = ['en','ro','ru'].includes(h.lang) ? h.lang : (saved || 'en');
    state.category = h.cat;
    state.query    = h.q;
    if (state.query) document.getElementById('searchInput').value = state.query;

    document.querySelectorAll('.lang-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.lang === state.lang));

    try {
        const idxRes = await fetch('./prompts/index.json');
        if (!idxRes.ok) throw new Error(`HTTP ${idxRes.status}`);
        const slugs = await idxRes.json();
        const files = await Promise.all(
            slugs.map(s => fetch(`./prompts/${s}.json`).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status} — prompts/${s}.json`);
                return r.json();
            }))
        );
        state.prompts = files.flat();
    } catch (err) {
        document.getElementById('cardsGrid').innerHTML =
            `<div class="state-panel">
                <p style="font-weight:700;color:#991b1b;margin:0 0 6px">⚠ Could not load prompts</p>
                <p style="font-size:.88em;margin:0">${esc(err.message)}</p>
             </div>`;
        return;
    }
    buildFuse();
    render();
}
init();
</script>
