<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multilingual AI Prompt Library for Educators — USM">
    <title>Prompt Library for Educators — USM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.js"></script>
    <style>
        :root {
            --usm-dark:   #003d1a;
            --usm-main:   #007a33;
            --usm-mid:    #005a26;
            --usm-light:  #e6f5ec;
            --usm-border: #b8d8c4;
            --usm-bg:     #f9f9f9;
            --text-1:     #1a1a1a;
            --text-2:     #555555;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: Arial, Calibri, sans-serif;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-1);
            background: var(--usm-bg);
            margin: 0;
        }

        /* ── Header ─────────────────────────────────────────── */
        .site-header {
            background: var(--usm-dark);
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--usm-main);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
        }
        .header-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .header-title  { font-size: 1.05em; font-weight: bold; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-sub    { font-size: 0.75em; opacity: 0.72; white-space: nowrap; }
        .lang-group    { display: flex; gap: 5px; flex-shrink: 0; }
        .lang-btn {
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.35);
            color: rgba(255,255,255,0.7);
            background: transparent;
            transition: all .2s;
        }
        .lang-btn.active { background: #fff; color: var(--usm-dark); border-color: #fff; }
        .lang-btn:hover:not(.active) { border-color: #fff; color: #fff; }

        /* ── Layout ─────────────────────────────────────────── */
        .layout {
            max-width: 1160px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-areas: "sidebar main";
            gap: 28px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-areas: "main";
                gap: 0;
            }
            .sidebar { display: none; }
        }
        .sidebar  { grid-area: sidebar; position: sticky; top: 80px; }
        .main-col { grid-area: main; min-width: 0; }

        /* ── Sidebar ─────────────────────────────────────────── */
        .sidebar-section {
            background: #fff;
            border: 1px solid var(--usm-border);
            border-top: 4px solid var(--usm-main);
            border-radius: 10px;
            padding: 16px;
        }
        .sidebar-label {
            font-size: 0.78em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-2);
            margin-bottom: 10px;
        }
        .sidebar-cat {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.9em;
            color: var(--text-1);
            transition: background .15s, color .15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .sidebar-cat:hover  { background: var(--usm-light); color: var(--usm-main); }
        .sidebar-cat.active { background: var(--usm-dark); color: #fff; font-weight: bold; }
        .cat-count {
            margin-left: auto;
            font-size: 0.78em;
            background: rgba(0,0,0,0.07);
            border-radius: 12px;
            padding: 1px 7px;
        }
        .sidebar-cat.active .cat-count { background: rgba(255,255,255,0.2); }

        /* ── Mobile category pills ───────────────────────────── */
        .mobile-cats {
            display: none;
            overflow-x: auto;
            gap: 7px;
            padding: 4px 0 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .mobile-cats::-webkit-scrollbar { display: none; }
        .mobile-cat-pill {
            display: inline-flex;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.86em;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--usm-border);
            background: #fff;
            color: var(--text-1);
            white-space: nowrap;
            transition: all .2s;
            flex-shrink: 0;
            font-family: inherit;
        }
        .mobile-cat-pill:hover  { border-color: var(--usm-main); color: var(--usm-main); background: var(--usm-light); }
        .mobile-cat-pill.active { background: var(--usm-dark); color: #fff; border-color: var(--usm-dark); }
        @media (max-width: 768px) { .mobile-cats { display: flex; } }

        /* ── Search ─────────────────────────────────────────── */
        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-2);
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 44px;
            border: 2px solid var(--usm-border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            color: var(--text-1);
        }
        .search-input:focus {
            border-color: var(--usm-main);
            box-shadow: 0 0 0 3px rgba(0,122,51,.12);
        }
        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-2);
            padding: 2px;
            display: none;
            line-height: 1;
        }
        .search-clear:hover { color: var(--text-1); }
        .search-clear.visible { display: block; }

        /* ── Results count ───────────────────────────────────── */
        .results-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 0.87em;
            color: var(--text-2);
        }

        /* ── Cards ───────────────────────────────────────────── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 620px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }

        .prompt-card {
            background: #fff;
            border: 1px solid var(--usm-border);
            border-top: 4px solid var(--usm-main);
            border-radius: 10px;
            padding: 16px 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: box-shadow .2s, border-color .2s;
        }
        .prompt-card:hover {
            box-shadow: 0 4px 18px rgba(0,122,51,.13);
            border-color: var(--usm-main);
        }
        .card-cat-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.76em;
            font-weight: bold;
            background: var(--usm-light);
            color: var(--usm-mid);
            align-self: flex-start;
        }
        .card-title {
            font-size: 0.97em;
            font-weight: bold;
            color: var(--usm-dark);
            line-height: 1.4;
        }
        .card-body {
            font-size: 0.88em;
            color: var(--text-1);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-line;
            flex-grow: 1;
        }
        .card-body.expanded {
            display: block;
            -webkit-line-clamp: unset;
        }
        .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            background: #f4f7fa;
            color: var(--text-2);
            border: 1px solid #e0e0e0;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }
        .expand-btn {
            font-size: 0.82em;
            color: var(--usm-main);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-weight: 600;
            font-family: inherit;
        }
        .expand-btn:hover { text-decoration: underline; }
        .copy-btn {
            padding: 6px 16px;
            border-radius: 7px;
            font-size: 0.84em;
            font-weight: bold;
            cursor: pointer;
            background: var(--usm-dark);
            color: #fff;
            border: none;
            font-family: inherit;
            transition: background .2s, color .2s;
        }
        .copy-btn:hover  { background: var(--usm-mid); }
        .copy-btn.copied { background: #d4edda; color: #155724; }

        /* ── Empty state ─────────────────────────────────────── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-2);
        }

        /* ── Footer ──────────────────────────────────────────── */
        .site-footer {
            text-align: center;
            padding: 28px 20px;
            font-size: 0.85em;
            color: #777;
            border-top: 1px solid var(--usm-border);
        }

        /* ── Loading spinner ─────────────────────────────────── */
        .loading { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-2); }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--usm-border);
            border-top-color: var(--usm-main);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Scrollbar ───────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--usm-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--usm-main); }

        @media (max-width: 480px) {
            .header-sub { display: none; }
            .lang-btn { padding: 3px 8px; font-size: 0.78em; }
            .layout { padding: 16px 14px 50px; }
        }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header class="site-header">
    <div class="header-brand">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" aria-hidden="true">
            <rect width="30" height="30" rx="7" fill="white" fill-opacity="0.1"/>
            <path d="M7 9h16M7 13h12M7 17h14M7 21h9" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="23" cy="21" r="5.5" fill="#007a33" stroke="white" stroke-width="1.5"/>
            <path d="M21 21h4M23 19v4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div>
            <div class="header-title" id="headerTitle">Prompt Library for Educators</div>
            <div class="header-sub"  id="headerSub">Multilingual AI prompts for modern educators</div>
        </div>
    </div>
    <div class="lang-group" role="group" aria-label="Language selector">
        <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
        <button class="lang-btn"        data-lang="ro" aria-pressed="false">RO</button>
        <button class="lang-btn"        data-lang="ru" aria-pressed="false">RU</button>
    </div>
</header>

<!-- ── Layout ───────────────────────────────────────────────────── -->
<div class="layout">

    <!-- Sidebar (desktop only) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label" id="sidebarCatsLabel">Categories</div>
            <div id="sidebarCats"></div>
        </div>
    </aside>

    <!-- Main column -->
    <div class="main-col">
        <div class="search-wrap">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" id="searchInput" class="search-input"
                   placeholder="Search prompts…" autocomplete="off" spellcheck="false"
                   aria-label="Search prompts">
            <button class="search-clear" id="searchClear" aria-label="Clear search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Mobile pills (hidden on desktop) -->
        <div class="mobile-cats" id="mobileCats" role="list"></div>

        <div class="results-bar">
            <span id="resultsCount"></span>
        </div>

        <div class="cards-grid" id="cardsGrid" role="list">
            <div class="loading">
                <div class="spinner"></div>
                Loading prompts…
            </div>
        </div>
    </div>
</div>

<footer class="site-footer">
    <span id="footerText">Prompt Library for Educators &mdash; USM &copy; 2026 by Maidacenco Anastasia</span>
</footer>

<script>
/* ─────────────────────────────────────────────────────────────
   UI labels — three languages
───────────────────────────────────────────────────────────── */
const UI = {
    en: {
        searchPlaceholder: "Search prompts…",
        copy: "Copy", copied: "Copied!",
        expandMore: "Show full prompt ↓", expandLess: "Show less ↑",
        cats: "Categories", all: "All",
        noResults: "No prompts found.",
        noHint: "Try different keywords or clear the category filter.",
        count: (n, tot) => n === tot ? `${n} prompt${n!==1?'s':''}` : `${n} of ${tot} prompts`,
        headerTitle: "Prompt Library for Educators",
        headerSub:   "Multilingual AI prompts for modern educators",
        footer:      "Prompt Library for Educators &mdash; USM &copy; 2026",
    },
    ro: {
        searchPlaceholder: "Caută prompturi…",
        copy: "Copiază", copied: "Copiat!",
        expandMore: "Afișează tot ↓", expandLess: "Restrânge ↑",
        cats: "Categorii", all: "Toate",
        noResults: "Nu s-au găsit prompturi.",
        noHint: "Încearcă alte cuvinte cheie sau șterge filtrul de categorie.",
        count: (n, tot) => n === tot ? `${n} prompturi` : `${n} din ${tot} prompturi`,
        headerTitle: "Bibliotecă de Prompturi pentru Educatori",
        headerSub:   "Prompturi AI multilingve pentru educatori moderni",
        footer:      "Bibliotecă de Prompturi pentru Educatori &mdash; USM &copy; 2026",
    },
    ru: {
        searchPlaceholder: "Поиск промптов…",
        copy: "Копировать", copied: "Скопировано!",
        expandMore: "Показать полностью ↓", expandLess: "Свернуть ↑",
        cats: "Категории", all: "Все",
        noResults: "Промпты не найдены.",
        noHint: "Попробуйте другие ключевые слова или сбросьте фильтр.",
        count: (n, tot) => n === tot ? `${n} промптов` : `${n} из ${tot} промптов`,
        headerTitle: "Библиотека промптов для педагогов",
        headerSub:   "Многоязычные AI-промпты для современных педагогов",
        footer:      "Библиотека промптов для педагогов &mdash; USM &copy; 2026",
    }
};

const CAT_LABELS = {
    "All":             { en:"All",             ro:"Toate",            ru:"Все"            },
    "Assessment":      { en:"Assessment",      ro:"Evaluare",         ru:"Оценивание"     },
    "Lesson Planning": { en:"Lesson Planning", ro:"Planif. lecției",  ru:"Планир. урока"  },
    "Logopedics":      { en:"Logopedics",      ro:"Logopedie",        ru:"Логопедия"      },
    "Communication":   { en:"Communication",   ro:"Comunicare",       ru:"Коммуникация"   },
    "Differentiation": { en:"Differentiation", ro:"Diferențiere",     ru:"Дифференциация" },
    "Creativity":      { en:"Creativity",      ro:"Creativitate",     ru:"Творчество"     },
    "University":       { en:"University",      ro:"Universitar",      ru:"Университет"    },
    "Academic Writing": { en:"Academic Writing",ro:"Scriere academică",ru:"Академ. письмо" },
    "Student Productivity": { en:"Student Productivity", ro:"Productivitate student", ru:"Продуктивность студента" },
    "Teaching Support": { en:"Teaching Support", ro:"Suport didactic", ru:"Педагогическая поддержка" },
    "University Educators": { en:"University Educators", ro:"Cadre didactice universitare", ru:"Преподаватели вузов" },
};

/* ─────────────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────────────── */
const state = {
    lang: 'en', category: 'All', query: '',
    prompts: [], expanded: new Set(),
};
let fuseInstance = null;

/* ─────────────────────────────────────────────────────────────
   URL hash
───────────────────────────────────────────────────────────── */
function parseHash() {
    const p = new URLSearchParams(location.hash.replace(/^#/, ''));
    return { lang: p.get('lang')||'en', cat: p.get('cat')||'All', q: p.get('q')||'' };
}
function pushHash() {
    const p = new URLSearchParams();
    if (state.lang !== 'en')      p.set('lang', state.lang);
    if (state.category !== 'All') p.set('cat',  state.category);
    if (state.query.trim())       p.set('q',    state.query.trim());
    const s = p.toString();
    history.pushState(null, '', s ? '#' + s : location.pathname + location.search);
}

/* ─────────────────────────────────────────────────────────────
   Fuse.js
───────────────────────────────────────────────────────────── */
function buildFuse() {
    const l = state.lang;
    fuseInstance = new Fuse(state.prompts, {
        keys: [
            { name: `title.${l}`,   weight: 0.40 },
            { name: `content.${l}`, weight: 0.35 },
            { name: 'tags',         weight: 0.25 },
            { name: 'title.en',     weight: 0.15 },
            { name: 'content.en',   weight: 0.10 },
        ],
        threshold: 0.38, ignoreLocation: true, minMatchCharLength: 2,
    });
}

/* ─────────────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────────────── */
function t(obj) { return (obj && (obj[state.lang] || obj['en'])) || ''; }
function catLabel(cat) { return (CAT_LABELS[cat] && CAT_LABELS[cat][state.lang]) || cat; }
function esc(s) {
    return String(s).replace(/[&<>"']/g,
        m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function getResults() {
    let list = state.query.trim().length >= 2 && fuseInstance
        ? fuseInstance.search(state.query).map(r => r.item)
        : [...state.prompts];
    if (state.category !== 'All') list = list.filter(p => p.category === state.category);
    return list;
}

function getCounts() {
    const base = state.query.trim().length >= 2 && fuseInstance
        ? fuseInstance.search(state.query).map(r => r.item)
        : [...state.prompts];
    return base.reduce((acc, p) => { acc[p.category] = (acc[p.category]||0)+1; return acc; }, {});
}

/* ─────────────────────────────────────────────────────────────
   Render
───────────────────────────────────────────────────────────── */
function renderSidebar(counts) {
    document.getElementById('sidebarCatsLabel').textContent = UI[state.lang].cats;
    const cats = ['All', ...new Set(state.prompts.map(p => p.category))];
    const total = Object.values(counts).reduce((a,b)=>a+b, 0);
    document.getElementById('sidebarCats').innerHTML = cats.map(cat => {
        const n = cat === 'All' ? total : (counts[cat]||0);
        return `<button class="sidebar-cat${state.category===cat?' active':''}" data-cat="${esc(cat)}">
            <span>${esc(catLabel(cat))}</span><span class="cat-count">${n}</span>
        </button>`;
    }).join('');
}

function renderMobileCats() {
    const cats = ['All', ...new Set(state.prompts.map(p => p.category))];
    document.getElementById('mobileCats').innerHTML = cats.map(cat =>
        `<button class="mobile-cat-pill${state.category===cat?' active':''}" data-cat="${esc(cat)}">${esc(catLabel(cat))}</button>`
    ).join('');
}

function renderCards(results) {
    const ui   = UI[state.lang];
    const grid = document.getElementById('cardsGrid');
    if (!results.length) {
        grid.innerHTML = `
        <div class="empty-state">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none"
                 stroke="#b8d8c4" stroke-width="1.5" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <p style="font-weight:bold;font-size:1.05em;margin:0 0 6px">${esc(ui.noResults)}</p>
            <p style="margin:0">${esc(ui.noHint)}</p>
        </div>`;
        return;
    }
    grid.innerHTML = results.map(p => {
        const isExp = state.expanded.has(p.id);
        const tags  = (p.tags||[]).map(tag=>`<span class="tag">${esc(tag)}</span>`).join('');
        return `
        <article class="prompt-card" id="card-${p.id}" role="listitem">
            <span class="card-cat-badge">${esc(catLabel(p.category))}</span>
            <div class="card-title">${esc(t(p.title))}</div>
            <div class="card-body${isExp?' expanded':''}" id="body-${p.id}">${esc(t(p.content))}</div>
            <div class="card-tags">${tags}</div>
            <div class="card-footer">
                <button class="expand-btn" id="expbtn-${p.id}"
                        onclick="toggleExpand('${p.id}')" aria-expanded="${isExp}">
                    ${esc(isExp ? ui.expandLess : ui.expandMore)}
                </button>
                <button class="copy-btn" id="copybtn-${p.id}"
                        onclick="copyPrompt('${p.id}', this)">
                    ${esc(ui.copy)}
                </button>
            </div>
        </article>`;
    }).join('');
}

function render() {
    const ui      = UI[state.lang];
    const results = getResults();
    const counts  = getCounts();

    document.getElementById('headerTitle').textContent    = ui.headerTitle;
    document.getElementById('headerSub').textContent      = ui.headerSub;
    document.getElementById('footerText').innerHTML       = ui.footer;
    document.getElementById('searchInput').placeholder    = ui.searchPlaceholder;
    document.getElementById('resultsCount').textContent   = ui.count(results.length, state.prompts.length);
    document.title = ui.headerTitle + ' — USM';
    document.documentElement.lang = state.lang;

    document.querySelectorAll('.lang-btn').forEach(btn => {
        const a = btn.dataset.lang === state.lang;
        btn.classList.toggle('active', a);
        btn.setAttribute('aria-pressed', a);
    });
    document.getElementById('searchClear')
        .classList.toggle('visible', state.query.length > 0);

    renderSidebar(counts);
    renderMobileCats();
    renderCards(results);
}

/* ─────────────────────────────────────────────────────────────
   Interactions
───────────────────────────────────────────────────────────── */
function toggleExpand(id) {
    const nowExp = !state.expanded.has(id);
    nowExp ? state.expanded.add(id) : state.expanded.delete(id);
    const ui = UI[state.lang];
    const body = document.getElementById(`body-${id}`);
    const btn  = document.getElementById(`expbtn-${id}`);
    if (body) body.classList.toggle('expanded', nowExp);
    if (btn)  { btn.textContent = nowExp ? ui.expandLess : ui.expandMore; btn.setAttribute('aria-expanded', nowExp); }
}

function copyPrompt(id, btn) {
    const p = state.prompts.find(x => x.id === id);
    if (!p) return;
    const text = t(p.content);
    const ui   = UI[state.lang];
    const done = () => {
        btn.textContent = ui.copied;
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = ui.copy; btn.classList.remove('copied'); }, 2200);
    };
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(done);
    } else {
        const ta = Object.assign(document.createElement('textarea'),
            { value: text });
        Object.assign(ta.style, { position:'fixed', opacity:'0', top:'0', left:'0' });
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch(_){}
        document.body.removeChild(ta);
        done();
    }
}

function setCategory(cat) {
    state.category = cat;
    state.expanded.clear();
    pushHash();
    render();
}

/* ─────────────────────────────────────────────────────────────
   Event listeners
───────────────────────────────────────────────────────────── */
document.getElementById('sidebarCats').addEventListener('click', e => {
    const btn = e.target.closest('.sidebar-cat');
    if (btn) setCategory(btn.dataset.cat);
});
document.getElementById('mobileCats').addEventListener('click', e => {
    const btn = e.target.closest('.mobile-cat-pill');
    if (btn) setCategory(btn.dataset.cat);
});

let debounce;
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
        state.query = e.target.value;
        state.expanded.clear();
        pushHash();
        render();
    }, 180);
});

document.getElementById('searchClear').addEventListener('click', () => {
    state.query = '';
    document.getElementById('searchInput').value = '';
    state.expanded.clear();
    pushHash();
    render();
    document.getElementById('searchInput').focus();
});

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
    if (state.lang === btn.dataset.lang) return;
    state.lang = btn.dataset.lang;
    buildFuse();
    pushHash();
    render();
}));

window.addEventListener('popstate', () => {
    const h = parseHash();
    state.lang     = ['en','ro','ru'].includes(h.lang) ? h.lang : 'en';
    state.category = h.cat;
    state.query    = h.q;
    document.getElementById('searchInput').value = state.query;
    buildFuse();
    render();
});

/* ─────────────────────────────────────────────────────────────
   Bootstrap
───────────────────────────────────────────────────────────── */
async function init() {
    const h = parseHash();
    state.lang     = ['en','ro','ru'].includes(h.lang) ? h.lang : 'en';
    state.category = h.cat;
    state.query    = h.q;
    if (state.query) document.getElementById('searchInput').value = state.query;

    try {
        const idxRes = await fetch('./prompts/index.json');
        if (!idxRes.ok) throw new Error(`HTTP ${idxRes.status}`);
        const slugs = await idxRes.json();
        const files = await Promise.all(
            slugs.map(s => fetch(`./prompts/${s}.json`).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status} loading prompts/${s}.json`);
                return r.json();
            }))
        );
        state.prompts = files.flat();
    } catch (err) {
        document.getElementById('cardsGrid').innerHTML =
            `<div class="empty-state">
                <p style="font-weight:bold;color:#721c24;margin:0 0 6px">⚠ Could not load prompts</p>
                <p style="margin:0;font-size:0.9em">${err.message}. Make sure the prompts/ folder is present.</p>
             </div>`;
        return;
    }
    buildFuse();
    render();
}
init();
</script>
